<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Job Application Form</h1>

    <form action="#" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
      </div>

      <div class="form-row align-items-center">
        <div class="form-group">
          <label for="position">Position:</label>
          <select id="position" name="position" required>
            <option value="">Select a position</option>
            <option value="developer">Developer</option>
            <option value="designer">Designer</option>
            <option value="manager">Manager</option>
          </select>
        </div>

        <div class="form-group">
          <fieldset class="radio-group">
            <legend>Availability</legend>
            <div class="radio-option">
              <input type="radio" id="fulltime" name="availability" value="full-time" required>
              <label for="fulltime">Full-Time</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="parttime" name="availability" value="part-time" required>
              <label for="parttime">Part-Time</label>
            </div>
          </fieldset>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Why do you want this job?</label>
        <textarea
          id="message"
          name="message"
          rows="3"
          placeholder="Write your motivation"
          required
        ></textarea>
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>

</body>
</html>
